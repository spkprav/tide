<!doctype html>
<html><head><meta charset="utf-8"><title>Tide — Add project</title>
<link rel="stylesheet" href="tide.css"></head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="lights"><div class="light r"></div><div class="light y"></div><div class="light g"></div></div>
    <div class="title">Tide</div>
  </div>
  <div class="main">
    <aside class="sidebar">
      <h6>Projects</h6>
      <div class="proj"><span class="dot" style="background:#9ECE6A"></span>acme-web</div>
      <div class="proj"><span class="dot" style="background:#7AA2F7"></span>payments-api</div>
      <div class="proj"><span class="dot" style="background:#BB9AF7"></span>mobile-sdk</div>
      <div class="proj"><span class="dot" style="background:#FF9E64"></span>data-pipeline</div>
      <div class="spacer"></div>
      <div class="add">+ Add project</div>
    </aside>
    <section class="content">
      <div class="tabbar">
        <div class="tab active">Start</div>
        <div class="tab newtab">+</div>
      </div>
      <div class="start"></div>
    </section>
  </div>
  <div class="scrim">
    <div class="sheet" style="width: 460px;">
      <h2>New project</h2>
      <div>
        <label>Name</label>
        <input value="acme-web"/>
      </div>
      <div>
        <label>Working directory</label>
        <input value="~/code/acme-web"/>
      </div>
      <div>
        <label>Color tag</label>
        <div style="display:flex; gap:8px;">
          <span style="width:24px;height:24px;border-radius:50%;background:#9ECE6A;box-shadow:0 0 0 2px #fff inset, 0 0 0 3px #9ECE6A"></span>
          <span style="width:24px;height:24px;border-radius:50%;background:#7AA2F7"></span>
          <span style="width:24px;height:24px;border-radius:50%;background:#BB9AF7"></span>
          <span style="width:24px;height:24px;border-radius:50%;background:#FF9E64"></span>
          <span style="width:24px;height:24px;border-radius:50%;background:#F7768E"></span>
          <span style="width:24px;height:24px;border-radius:50%;background:#E0AF68"></span>
          <span style="width:24px;height:24px;border-radius:50%;background:#7DCFFF"></span>
        </div>
      </div>
      <div class="actions">
        <div class="btn">Cancel</div>
        <div class="btn primary">Add</div>
      </div>
    </div>
  </div>
</div>
</body></html>
