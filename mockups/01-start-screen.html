<!doctype html>
<html><head><meta charset="utf-8"><title>Tide — Start screen</title>
<link rel="stylesheet" href="tide.css"></head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="lights"><div class="light r"></div><div class="light y"></div><div class="light g"></div></div>
    <div class="title">Tide — acme-web</div>
  </div>
  <div class="main">
    <aside class="sidebar">
      <h6>Projects</h6>
      <div class="proj active"><span class="dot" style="background:#9ECE6A"></span>acme-web</div>
      <div class="proj"><span class="dot" style="background:#7AA2F7"></span>payments-api</div>
      <div class="proj"><span class="dot" style="background:#BB9AF7"></span>mobile-sdk</div>
      <div class="proj"><span class="dot" style="background:#FF9E64"></span>data-pipeline</div>
      <div class="spacer"></div>
      <div class="add">+ Add project</div>
    </aside>
    <section class="content">
      <div class="tabbar">
        <div class="tab active">Start</div>
        <div class="tab newtab">+</div>
      </div>
      <div class="start">
        <div class="start-card">
          <div class="icon">A</div>
          <h1>acme-web</h1>
          <p>~/code/acme-web · 4-pane startup configured · last started 2 hours ago</p>
          <div class="btn-row">
            <div class="btn">Configure</div>
            <div class="btn primary">Start<span class="kbd">⏎</span></div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
</body></html>
