<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#22243B"/>
      <stop offset="1" stop-color="#13141B"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7DCFFF"/>
      <stop offset="0.55" stop-color="#7AA2F7"/>
      <stop offset="1" stop-color="#3D59C8"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#73DACA"/>
      <stop offset="1" stop-color="#4F76C0"/>
    </linearGradient>
    <linearGradient id="wave3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#BB9AF7"/>
      <stop offset="1" stop-color="#5A4AB0"/>
    </linearGradient>
    <radialGradient id="promptGlow" cx="0.72" cy="0.3" r="0.42">
      <stop offset="0" stop-color="#F7D794" stop-opacity="0.6"/>
      <stop offset="0.5" stop-color="#F7D794" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#F7D794" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="promptFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF1C6"/>
      <stop offset="0.55" stop-color="#F7D794"/>
      <stop offset="1" stop-color="#E0B864"/>
    </linearGradient>
    <filter id="promptSoftGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clipApp">
      <rect x="0" y="0" width="1024" height="1024" rx="185"/>
    </clipPath>
  </defs>

  <!-- Apple macOS icon grid: body at 824x824 centered in 1024 (100px padding) -->
  <g transform="translate(100 100) scale(0.805)">
    <rect x="0" y="0" width="1024" height="1024" rx="185" fill="url(#bg)"/>

    <g clip-path="url(#clipApp)">
      <rect x="0" y="0" width="1024" height="1024" fill="url(#promptGlow)"/>

      <circle cx="160" cy="200" r="2.6" fill="#C0CAF5" opacity="0.78"/>
      <circle cx="260" cy="160" r="1.8" fill="#C0CAF5" opacity="0.55"/>
      <circle cx="380" cy="220" r="2.3" fill="#C0CAF5" opacity="0.66"/>
      <circle cx="180" cy="320" r="1.8" fill="#C0CAF5" opacity="0.5"/>
      <circle cx="320" cy="380" r="2.6" fill="#C0CAF5" opacity="0.7"/>
      <circle cx="460" cy="160" r="1.6" fill="#C0CAF5" opacity="0.5"/>
      <circle cx="540" cy="300" r="2"   fill="#C0CAF5" opacity="0.55"/>
      <circle cx="200" cy="460" r="1.6" fill="#C0CAF5" opacity="0.45"/>
      <circle cx="420" cy="440" r="2"   fill="#C0CAF5" opacity="0.55"/>
      <circle cx="900" cy="160" r="1.8" fill="#C0CAF5" opacity="0.55"/>

      <g filter="url(#promptSoftGlow)">
        <path d="M 660 220 L 760 312 L 660 404"
              stroke="url(#promptFill)" stroke-width="44"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <rect x="790" y="276" width="44" height="72" rx="6"
              fill="url(#promptFill)"/>
      </g>
      <rect x="790" y="276" width="44" height="32" rx="6"
            fill="#FFF6D5" opacity="0.45"/>

      <rect x="0" y="560" width="1024" height="1.5" fill="#414868" opacity="0.45"/>

      <path d="M -50 620
               C 160 550, 320 700, 480 620
               S 800 700, 1100 600
               L 1100 1080 L -50 1080 Z"
            fill="url(#wave3)" opacity="0.62"/>

      <path d="M -50 740
               C 180 660, 360 820, 540 720
               S 880 820, 1100 740
               L 1100 1080 L -50 1080 Z"
            fill="url(#wave2)" opacity="0.85"/>

      <path d="M -50 860
               C 180 770, 380 940, 580 830
               S 880 940, 1100 850
               L 1100 1080 L -50 1080 Z"
            fill="url(#wave1)"/>

      <path d="M -50 860
               C 180 770, 380 940, 580 830
               S 880 940, 1100 850"
            fill="none" stroke="#C0CAF5" stroke-width="5"
            stroke-linecap="round" opacity="0.55"/>
      <path d="M -50 740
               C 180 660, 360 820, 540 720
               S 880 820, 1100 740"
            fill="none" stroke="#9ECE6A" stroke-width="2.5"
            stroke-linecap="round" opacity="0.45"/>

      <circle cx="260" cy="820" r="6"   fill="#C0CAF5" opacity="0.85"/>
      <circle cx="340" cy="870" r="4"   fill="#C0CAF5" opacity="0.7"/>
      <circle cx="660" cy="820" r="5"   fill="#C0CAF5" opacity="0.8"/>
      <circle cx="800" cy="880" r="4"   fill="#C0CAF5" opacity="0.7"/>
      <circle cx="900" cy="850" r="6"   fill="#C0CAF5" opacity="0.85"/>
      <circle cx="140" cy="880" r="3.5" fill="#C0CAF5" opacity="0.6"/>

      <rect x="690" y="870" width="148" height="9" rx="4"
            fill="#F7D794" opacity="0.34"/>
      <rect x="708" y="886" width="116" height="6" rx="3"
            fill="#F7D794" opacity="0.24"/>
      <rect x="724" y="900" width="86"  height="4" rx="2"
            fill="#F7D794" opacity="0.16"/>
    </g>

    <rect x="0" y="0" width="1024" height="1024" rx="185"
          fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.10"/>
    <rect x="1" y="1" width="1022" height="1022" rx="184"
          fill="none" stroke="#000000" stroke-width="1" opacity="0.30"/>
  </g>
</svg>
